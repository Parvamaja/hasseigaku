<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発生学クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap');

  :root{
    --paper:#f8f4ea;
    --line:#e4dcc8;
    --ink:#232b3a;
    --ink-soft:#5b6472;
    --red:#c1443a;
    --amber:#c98a2c;
    --gray:#8a8f98;
    --card:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:repeating-linear-gradient(to bottom, transparent 0px, transparent 27px, var(--line) 28px),
      linear-gradient(to right, transparent 46px, #e4b3ad 47px, transparent 48px);
    font-family:'Noto Sans JP', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }
  .wrap{max-width:480px; margin:0 auto; padding:22px 16px 60px 22px; min-height:100vh;}
  .font-display{font-family:'Shippori Mincho', serif;}
  .mono{font-family:'DM Mono', monospace;}

  h1.title{font-family:'Shippori Mincho', serif; font-size:34px; font-weight:800; line-height:1.25; margin:0 0 10px;}
  .eyebrow{font-size:11px; letter-spacing:.18em; color:var(--red); margin-bottom:8px; font-weight:600;}
  .lede{color:var(--ink-soft); font-size:13.5px; line-height:1.8; margin:0 0 26px;}

  .book-list{border:1px solid #d8d0ba; background:#fff; border-radius:8px; padding:14px 16px; margin-bottom:26px;}
  .book-list .label{font-size:11px; color:var(--ink-soft); margin-bottom:8px; font-weight:600;}
  .book-list ol{margin:0; padding:0; list-style:none;}
  .book-list li{font-size:13px; margin-bottom:6px; color:var(--ink);}
  .book-list li b{font-weight:700;}
  .book-list li span{color:var(--ink-soft); font-size:11.5px; margin-left:2px;}

  button{font-family:inherit; cursor:pointer;}
  .btn{
    width:100%; border:none; border-radius:8px; padding:15px; font-weight:600;
    font-size:14px; display:flex; align-items:center; justify-content:center; gap:6px;
    transition:background .15s, opacity .15s;
  }
  .btn-primary{background:#1c1a16; color:#fff;}
  .btn-primary:hover{background:#33302a;}
  .btn-primary:disabled{opacity:.3; cursor:not-allowed;}
  .btn-accent{background:var(--red); color:#fff;}
  .btn-accent:hover{background:#a83a31;}
  .btn-accent:disabled{opacity:.3; cursor:not-allowed;}
  .btn-outline{background:#fff; border:1px solid #a39c88; color:var(--ink);}
  .btn-outline:hover{background:#f2ede0;}
  .btn-ghost{background:none; color:var(--ink-soft); font-size:12px; padding:8px;}

  .step-header{display:flex; align-items:center; gap:12px; margin-bottom:18px;}
  .step-header .back{background:none; border:none; color:#a39c88; font-size:20px; padding:4px;}
  .step-header .step-label{font-size:11px; color:#a39c88;}
  .step-header .step-title{font-family:'Shippori Mincho', serif; font-size:19px; font-weight:700;}

  .toggle{
    width:100%; text-align:left; border:1px solid #c9c2ab; background:#fff; border-radius:7px;
    padding:12px 14px; margin-bottom:9px; transition:border-color .15s, background .15s;
  }
  .toggle .t-title{font-size:13.5px; font-weight:600;}
  .toggle .t-sub{font-size:11px; color:var(--ink-soft); margin-top:2px;}
  .toggle.on{border-color:#1c1a16; background:#1c1a16;}
  .toggle.on .t-title{color:#fff;}
  .toggle.on .t-sub{color:#c9c5b8;}
  .toggle.on-red{border-color:var(--red); background:#fbe9e6;}
  .toggle.on-red .t-title{color:#8a2f27;}
  .toggle.on-amber{border-color:var(--amber); background:#faf1de;}
  .toggle.on-amber .t-title{color:#8a601c;}
  .toggle.on-gray{border-color:#8a8f98; background:#eceded;}
  .toggle.on-gray .t-title{color:#4b4f57;}

  .link-row{display:flex; justify-content:flex-end; gap:12px; margin-bottom:8px;}
  .link-row button{background:none; border:none; font-size:11.5px; color:var(--ink-soft); text-decoration:underline;}

  .unit-scroll{max-height:54vh; overflow-y:auto; padding-right:2px; margin-bottom:18px;}

  .count-box{border:1px solid #d8d0ba; background:#fff; border-radius:8px; padding:12px; margin-bottom:18px; text-align:center;}
  .count-box .cb-label{font-size:11px; color:var(--ink-soft); margin-bottom:2px;}
  .count-box .cb-num{font-family:'Shippori Mincho', serif; font-size:26px; font-weight:800;}

  .top-bar{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .top-bar button{background:none; border:none; color:#a39c88; font-size:19px;}
  .top-bar .counter{font-size:11px; color:var(--ink-soft); font-weight:600;}
  .progress{height:6px; background:#e5ded0; border-radius:99px; overflow:hidden; margin-bottom:18px;}
  .progress > div{height:100%; background:var(--red); transition:width .3s;}

  .chip{display:inline-block; font-size:10.5px; padding:2px 9px; border-radius:99px; border:1px solid; font-weight:600;}
  .chip-high{background:#fbe9e6; color:#8a2f27; border-color:#f0c3bd;}
  .chip-mid{background:#faf1de; color:#8a601c; border-color:#eeddb8;}
  .chip-low{background:#f0f1f2; color:#5b6472; border-color:#d7dade;}
  .meta-row{display:flex; align-items:center; gap:8px; margin-bottom:12px;}
  .meta-row .unit-name{font-size:11px; color:var(--ink-soft);}

  .q-card{background:#fff; border:1px solid #c9c2ab; border-radius:8px; padding:20px; margin-bottom:18px;}
  .q-card p{font-family:'Shippori Mincho', serif; font-size:17.5px; line-height:1.7; margin:0; color:var(--ink);}

  .opt-btn{
    position:relative; width:100%; text-align:left; border:1px solid #c9c2ab; background:#fff;
    border-radius:7px; padding:13px 16px; font-size:13.5px; margin-bottom:9px; overflow:visible;
  }
  .opt-btn.correct{border-color:var(--red); background:#fbe9e6; color:#1c1a16;}
  .opt-btn.wrong-selected{border-color:#c9c2ab; background:#f4f1e8; color:#8a8478;}
  .opt-btn.dim{border-color:#e5ded0; background:#fff; color:#b6b0a0;}
  .opt-btn:disabled{cursor:default;}

  .reveal-btn{width:100%; border:1.5px dashed #a39c88; background:none; border-radius:7px; padding:14px; font-size:13.5px; color:#6b6455;}
  .answer-box{border:1px solid #f0c3bd; background:#fbe9e6; border-radius:7px; padding:14px; margin-bottom:12px;}
  .answer-box .a-label{font-size:10.5px; color:var(--red); font-weight:700; margin-bottom:4px;}
  .answer-box .a-text{font-size:14px; color:var(--ink);}
  .self-score{display:flex; gap:10px;}
  .self-score button{flex:1; border-radius:7px; padding:11px; font-size:13px;}
  .ss-ok{border:1px solid #f0c3bd; background:#fff; color:var(--ink);}
  .ss-ng{border:1px solid #c9c2ab; background:#fff; color:var(--ink-soft);}

  .order-hint{font-size:11px; color:var(--ink-soft); margin-bottom:8px;}
  .order-built{position:relative; background:#fff; border:1px solid #c9c2ab; border-radius:8px; padding:12px; min-height:54px; display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start; margin-bottom:12px;}
  .order-empty{font-size:12px; color:#b6b0a0; padding:6px 0;}
  .order-chip{display:flex; align-items:center; gap:6px; border:1px solid #a39c88; background:#f4f1e8; border-radius:99px; padding:4px 12px 4px 4px; font-size:12px;}
  .order-chip .num{width:19px; height:19px; border-radius:99px; background:#1c1a16; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:600;}
  .order-pool{display:flex; flex-wrap:wrap; gap:8px;}
  .order-pool button{border:1px solid #c9c2ab; background:#fff; border-radius:99px; padding:8px 15px; font-size:12px;}
  .order-correct{border:1px solid #f0c3bd; background:#fbe9e6; border-radius:7px; padding:12px; margin-top:10px; font-size:12px; line-height:1.7;}
  .order-correct .oc-label{color:var(--red); font-weight:700; margin-bottom:4px;}

  .result-score{text-align:center; margin:14px 0 26px;}
  .result-score .rs-label{font-size:11px; color:var(--ink-soft); margin-bottom:4px;}
  .result-score .rs-num{font-family:'Shippori Mincho', serif; font-size:46px; font-weight:800;}
  .result-score .rs-num small{font-size:22px; color:#b6b0a0; font-weight:600;}
  .result-score .rs-pct{color:var(--red); font-size:13px; font-weight:700; margin-top:2px;}

  .panel{border:1px solid #d8d0ba; background:#fff; border-radius:8px; padding:15px; margin-bottom:14px;}
  .panel .p-label{font-size:11px; color:var(--ink-soft); margin-bottom:10px; font-weight:600;}
  .pri-row{margin-bottom:10px;}
  .pri-row:last-child{margin-bottom:0;}
  .pri-row .pr-top{display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px;}
  .pri-row .pr-top .pr-num{color:var(--ink-soft);}
  .pri-bar{height:6px; background:#f0ede2; border-radius:99px; overflow:hidden;}
  .pri-bar > div{height:100%;}
  .bar-high{background:var(--red);} .bar-mid{background:var(--amber);} .bar-low{background:#8a8f98;}

  .wrong-list{max-height:220px; overflow-y:auto; padding-right:2px;}
  .wrong-list li{font-size:11.5px; color:var(--ink); border-bottom:1px solid #ece7d8; padding:7px 0; list-style:none;}
  .wrong-list li .w-unit{color:#b6b0a0;}

  @keyframes drawCircle{from{stroke-dashoffset:1;}to{stroke-dashoffset:0;}}
  @keyframes drawLine{from{stroke-dashoffset:1;}to{stroke-dashoffset:0;}}
  .hanko{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible;}
  .hanko ellipse{fill:none; stroke:#dc2626; stroke-width:6; stroke-linecap:round; stroke-dasharray:1; stroke-dashoffset:1; animation:drawCircle .55s ease-out forwards;}
  .hanko line{stroke:#dc2626; stroke-width:6; stroke-linecap:round; stroke-dasharray:1; stroke-dashoffset:1;}
  .hanko line.l1{animation:drawLine .3s ease-out both;}
  .hanko line.l2{animation:drawLine .3s ease-out .28s both;}

  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-thumb{background:#c9c2ab; border-radius:99px;}
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<!-- 問題データベース（冊子ごとに分割） -->
<script src="questions_star.js"></script>
<script src="questions_organs.js"></script>
<script src="questions_field.js"></script>
<script src="questions_toc.js"></script>
<script src="questions_exam.js"></script>
<script src="questions_mock.js"></script>

<!-- アプリ本体（UI・ロジック） -->
<script src="app.js"></script>
</body>
</html>
